apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: llm-platform
spec:
  template:
    spec:
      containers:
        - name: ollama
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
