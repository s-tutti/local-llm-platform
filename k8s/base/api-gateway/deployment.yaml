apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: llm-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: llm-platform/api-gateway:latest
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama.llm-platform.svc.cluster.local:11434"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
