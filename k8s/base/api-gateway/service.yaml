apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: llm-platform
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - port: 8000
      targetPort: http
      nodePort: 30080
      protocol: TCP
      name: http
