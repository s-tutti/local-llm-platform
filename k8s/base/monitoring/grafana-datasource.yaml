apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: llm-platform
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.llm-platform.svc.cluster.local:9090
        isDefault: true
        editable: false
