apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: llm-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: "/var/lib/grafana/dashboards/llm-platform.json"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: dashboards-json
              mountPath: /var/lib/grafana/dashboards/llm-platform.json
              subPath: llm-platform.json
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-config
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: dashboards-json
          configMap:
            name: grafana-dashboards-config
            items:
              - key: llm-platform.json
                path: llm-platform.json
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: llm-platform
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: llm-platform
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - port: 3000
      targetPort: http
      nodePort: 30030
      name: http
