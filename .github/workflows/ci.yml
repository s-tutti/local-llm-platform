name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint YAML files
        run: yamllint -d relaxed k8s/

  kustomize-validate:
    name: Kustomize Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate local overlay
        run: kubectl kustomize k8s/overlays/local/ > /dev/null
      - name: Validate production overlay
        run: kubectl kustomize k8s/overlays/production/ > /dev/null

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]
    defaults:
      run:
        working-directory: infra/terraform/environments/${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"
      - name: Terraform Init
        run: terraform init -backend=false
      - name: Terraform Validate
        run: terraform validate
      - name: Terraform Format Check
        run: terraform fmt -check -recursive ../..

  tfsec:
    name: tfsec Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/terraform/
          soft_fail: false

  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API Gateway image
        run: docker build -t llm-platform/api-gateway:ci api-gateway/
      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "llm-platform/api-gateway:ci"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  conftest-terraform:
    name: Conftest Terraform Policies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install conftest
        run: |
          curl -sL https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz | tar xz
          sudo mv conftest /usr/local/bin/
      - name: Run OPA policies against good fixture
        run: conftest test policy/terraform/testdata/plan_good.json -p policy/terraform/

  kubeconform:
    name: Kubeconform Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/
      - name: Validate K8s manifests
        run: find k8s/base -name '*.yaml' -not -name 'kustomization.yaml' | xargs kubeconform -summary -strict

  conftest-k8s:
    name: Conftest K8s Policies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install conftest
        run: |
          curl -sL https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz | tar xz
          sudo mv conftest /usr/local/bin/
      - name: Run OPA policies on K8s manifests
        run: |
          for f in k8s/base/ollama/deployment.yaml k8s/base/api-gateway/deployment.yaml k8s/base/monitoring/prometheus-deployment.yaml k8s/base/monitoring/grafana-deployment.yaml; do
            echo "=== $f ==="
            conftest test "$f" -p policy/kubernetes/ || true
          done

  container-structure-test:
    name: Container Structure Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API Gateway image
        run: docker build -t llm-platform/api-gateway:test api-gateway/
      - name: Install container-structure-test
        run: |
          curl -sL https://github.com/GoogleContainerTools/container-structure-test/releases/download/v1.19.3/container-structure-test-linux-amd64 -o /usr/local/bin/container-structure-test
          chmod +x /usr/local/bin/container-structure-test
      - name: Run structure tests
        run: container-structure-test test --image llm-platform/api-gateway:test --config api-gateway/container-structure-test.yaml

  archgate:
    name: ADR Archgate Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run archgate
        run: npx tsx docs/adr/.rules/ADR-0001.ts . && npx tsx docs/adr/.rules/ADR-0002.ts . && npx tsx docs/adr/.rules/ADR-0003.ts . && npx tsx docs/adr/.rules/ADR-0004.ts .

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API Gateway
        run: docker build -t llm-platform/api-gateway:${{ github.sha }} api-gateway/
